name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "tests/**"
      - "ui/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "tests/**"
      - "ui/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      main: ${{ steps.filter.outputs.main }}
      agent: ${{ steps.filter.outputs.agent }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            main:
              - "src/**"
              - "tests/**"
              - "pyproject.toml"
              - "uv.lock"
            agent:
              - "packages/agent/**"
              - "pyproject.toml"
              - "uv.lock"
            ui:
              - "ui/**"

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  ty-main:
    needs: changes
    if: needs.changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev --all-packages
      - run: uv run ty check src/

  ty-agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev --all-packages
      - run: uv run ty check packages/agent/

  ui-typecheck:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: ui/yarn.lock
      - run: uv sync --dev --all-packages
      - run: uv run python ui/scripts/export_openapi.py
      - working-directory: ui
        run: yarn install --frozen-lockfile
      - working-directory: ui
        run: yarn openapi-ts
      - working-directory: ui
        run: yarn typecheck

  ui-lint:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: ui/yarn.lock
      - working-directory: ui
        run: yarn install --frozen-lockfile
      - working-directory: ui
        run: yarn lint

  ui-test:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: ui/yarn.lock
      - run: uv sync --dev --all-packages
      - run: uv run python ui/scripts/export_openapi.py
      - working-directory: ui
        run: yarn install --frozen-lockfile
      - working-directory: ui
        run: yarn openapi-ts
      - working-directory: ui
        run: yarn test

  pytest:
    needs: changes
    if: needs.changes.outputs.main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev --all-packages
      - run: uv run pytest -m "not requires_api_key"

  agent-eval:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev --all-packages
      - run: uv run pytest tests/test_agent_responses.py -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
