[project]
name = "agent"
version = "0.2.0"
description = "Claude agent that attaches to tools from MCP server"
readme = "README.md"
authors = [
    { name = "Mahdi Lamb", email = "mahdilamb@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "anthropic>=0.93.0",
    "fastapi>=0.135.3",
    "fastmcp>=3.2.3",
    "loguru>=0.7.3",
    "redis>=7.4.0",
    "uvicorn[standard]>=0.44.0",
]

[project.scripts]
agent = "agent.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "fakeredis>=2.35.0",
]
