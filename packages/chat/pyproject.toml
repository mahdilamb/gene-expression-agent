[project]
name = "chat"
version = "0.1.1"
description = "Streamlit chat frontend for the Claude agent"
readme = "README.md"
authors = [
    { name = "Mahdi Lamb", email = "mahdilamb@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "plotly>=6.7.0",
    "pydantic>=2.12.5",
    "streamlit>=1.56.0",
]

[project.scripts]
chat = "chat:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
